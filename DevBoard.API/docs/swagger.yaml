basePath: /api/v1
definitions:
  dtos.CityCreateRequest:
    properties:
      code:
        maxLength: 500
        type: string
      country_id:
        type: integer
      display_order:
        type: integer
      name:
        maxLength: 500
        minLength: 2
        type: string
    required:
    - name
    type: object
  dtos.CityResponse:
    properties:
      code:
        type: string
      country_id:
        type: integer
      display_order:
        type: integer
      id:
        type: integer
      name:
        type: string
    type: object
  dtos.CityUpdateRequest:
    properties:
      code:
        maxLength: 500
        type: string
      country_id:
        type: integer
      display_order:
        type: integer
      name:
        maxLength: 500
        minLength: 2
        type: string
    required:
    - name
    type: object
  dtos.CountryCreateRequest:
    properties:
      flag_code:
        maxLength: 500
        type: string
      name:
        maxLength: 500
        minLength: 2
        type: string
      phone_prefix:
        maxLength: 500
        type: string
      short_code:
        maxLength: 500
        type: string
    required:
    - flag_code
    - name
    - phone_prefix
    - short_code
    type: object
  dtos.CountryResponse:
    properties:
      flag_code:
        type: string
      id:
        type: integer
      name:
        type: string
      phone_prefix:
        type: string
      short_code:
        type: string
    type: object
  dtos.CountryUpdateRequest:
    properties:
      flag_code:
        maxLength: 500
        type: string
      name:
        maxLength: 500
        minLength: 2
        type: string
      phone_prefix:
        maxLength: 500
        type: string
      short_code:
        maxLength: 500
        type: string
    type: object
  dtos.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dtos.JobTypeCreateRequest:
    properties:
      name:
        maxLength: 500
        minLength: 2
        type: string
    required:
    - name
    type: object
  dtos.JobTypeResponse:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dtos.JobTypeUpdateRequest:
    properties:
      name:
        maxLength: 500
        minLength: 2
        type: string
    required:
    - name
    type: object
  dtos.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dtos.LogoutRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dtos.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dtos.ResetPasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dtos.SignupRequest:
    properties:
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 2
        type: string
      lastname:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
      phone_number:
        type: string
    required:
    - email
    - firstname
    - lastname
    - password
    type: object
  dtos.UserCreateRequest:
    properties:
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 2
        type: string
      lastname:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      phone_number:
        type: string
    required:
    - email
    - firstname
    - lastname
    - password
    type: object
  dtos.UserResponse:
    properties:
      birthdate:
        type: string
      city_id:
        type: integer
      created_on:
        type: string
      email:
        type: string
      firstname:
        type: string
      gender:
        type: integer
      id:
        type: string
      is_active:
        type: boolean
      is_email_validated:
        type: boolean
      last_modified_on:
        type: string
      lastname:
        type: string
      phone_number:
        type: string
      profile_picture:
        type: string
      roles:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  dtos.UserUpdateRequest:
    properties:
      email:
        type: string
      firstname:
        maxLength: 100
        minLength: 2
        type: string
      lastname:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
      phone_number:
        type: string
    type: object
  handler.MessageEnvelope:
    properties:
      data:
        $ref: '#/definitions/response.MessageBody'
      error:
        $ref: '#/definitions/response.ErrorBody'
      success:
        type: boolean
    type: object
  handler.UserEnvelope:
    properties:
      data:
        $ref: '#/definitions/dtos.UserResponse'
      error:
        $ref: '#/definitions/response.ErrorBody'
      success:
        type: boolean
    type: object
  handler.UserListEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/dtos.UserResponse'
        type: array
      error:
        $ref: '#/definitions/response.ErrorBody'
      success:
        type: boolean
    type: object
  response.ErrorBody:
    properties:
      code:
        type: string
      details: {}
      message:
        type: string
    type: object
  response.MessageBody:
    properties:
      message:
        type: string
    type: object
  response.Response:
    properties:
      data: {}
      error:
        $ref: '#/definitions/response.ErrorBody'
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Destek
    url: http://www.swagger.io/support
  description: Bu API'nin açıklaması
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: API Dökümanı
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Send a password reset email to the user
      parameters:
      - description: Forgot Password Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Request password reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password, sets session cookies, and returns
        a success message
      parameters:
      - description: Login Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revoke the refresh token and end the session
      parameters:
      - description: Logout Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: User logout
      tags:
      - auth
  /auth/me:
    get:
      consumes:
      - application/json
      description: Get the currently authenticated user's information using the session
        cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get current user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotate session cookies using a valid refresh token and return a
        success message
      parameters:
      - description: Refresh Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid refresh token
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Refresh tokens
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Reset password using the token received via email
      parameters:
      - description: Reset Password Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.MessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Reset password
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password, sets session cookies,
        and returns a success message
      parameters:
      - description: Signup Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.MessageEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: User signup
      tags:
      - auth
  /cities:
    get:
      description: Get a list of all cities
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dtos.CityResponse'
                  type: array
              type: object
      summary: Get all cities
      tags:
      - Cities
    post:
      consumes:
      - application/json
      description: Create a new city
      parameters:
      - description: City details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.CityCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CityResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create a new city
      tags:
      - Cities
  /cities/{id}:
    delete:
      description: Delete a city by its ID
      parameters:
      - description: City ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Delete a city
      tags:
      - Cities
    get:
      description: Get details of a city by its ID
      parameters:
      - description: City ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CityResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get a city by ID
      tags:
      - Cities
    put:
      consumes:
      - application/json
      description: Update an existing city
      parameters:
      - description: City ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.CityUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CityResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Update a city
      tags:
      - Cities
  /cities/country/{countryId}:
    get:
      description: Get all cities for a specific country
      parameters:
      - description: Country ID
        in: path
        name: countryId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dtos.CityResponse'
                  type: array
              type: object
      summary: Get cities by country ID
      tags:
      - Cities
  /countries:
    get:
      description: Get a list of all countries
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dtos.CountryResponse'
                  type: array
              type: object
      summary: Get all countries
      tags:
      - Countries
    post:
      consumes:
      - application/json
      description: Create a new country
      parameters:
      - description: Country details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.CountryCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CountryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create a new country
      tags:
      - Countries
  /countries/{id}:
    delete:
      description: Delete a country by its ID
      parameters:
      - description: Country ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Delete a country
      tags:
      - Countries
    get:
      description: Get details of a country by its ID
      parameters:
      - description: Country ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dtos.CountryResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get a country by ID
      tags:

name: Go Backend CI

on:
  push:
    branches: ["develop"]
    paths:
      - "DevBoard.API/**"
  pull_request:
    branches: ["develop"]
    paths:
      - "DevBoard.API/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 70

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-${{ hashFiles('DevBoard.API/go.sum') }}

      - name: Cache Go Build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-gobuild-${{ hashFiles('DevBoard.API/go.sum') }}

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Format hatası!"
            gofmt -d .
            exit 1
          fi

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run Linter
        run: golangci-lint run ./...

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Enforce Coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"

          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "Coverage düşük!"
            exit 1
          fi

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir -p build

          PKGS=$(go list -f '{{if eq .Name "main"}}{{.ImportPath}}{{end}}' ./... | grep -v '^$')

          for pkg in $PKGS; do
            name=$(basename $pkg)
            echo "Building $pkg -> $name"
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o build/$name $pkg
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binaries
          path: DevBoard.API/build

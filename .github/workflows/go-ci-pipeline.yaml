name: DevBoard CI

on:
  push:
    branches: ["develop"]
    paths:
      - "DevBoard.API/**"
      - ".github/workflows/**"

  pull_request:
    branches: ["develop"]
    paths:
      - "DevBoard.API/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  COVERAGE_THRESHOLD: 70

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-${{ hashFiles('DevBoard.API/go.sum', 'DevBoard.API/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-gomod-

      - name: Cache Go Build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-gobuild-${{ hashFiles('DevBoard.API/go.sum', 'DevBoard.API/go.mod') }}
          restore-keys: |
            ${{ runner.os }}-gobuild-

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Format hatası!"
            gofmt -d .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.57.2
          working-directory: DevBoard.API

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Enforce Coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')

          echo "Coverage: $COVERAGE%"

          if [ "$(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "Coverage düşük! ($COVERAGE% < $COVERAGE_THRESHOLD%)"
            exit 1
          fi

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir -p build

          for dir in $(find cmd -maxdepth 1 -mindepth 1 -type d); do
            name=$(basename $dir)
            echo "Building $dir -> $name"

            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o build/$name ./$dir
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-binaries
          path: DevBoard.API/build

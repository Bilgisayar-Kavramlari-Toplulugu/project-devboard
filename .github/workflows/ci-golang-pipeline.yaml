name: Go Backend CI

on:
  pull_request:
    branches: ["develop"]
    paths:
      - "DevBoard.API/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.API
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check Formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Kod formatı hatalı! Lütfen 'go fmt ./...' komutunu çalıştırın."
            gofmt -d .
            exit 1
          fi

      - name: Static Analysis (Vet)
        run: go vet ./...

  test:
    name: Unit Tests & Coverage
    needs: quality-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.API
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run Tests with Coverage
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Check Coverage Total
        run: go tool cover -func=coverage.txt

  build:
    name: Production Build
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.API
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Binary
        run: |
          CGO_ENABLED=0

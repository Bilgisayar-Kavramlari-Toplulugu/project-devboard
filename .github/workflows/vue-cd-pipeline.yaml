name: Vue CD Pipeline

on:
  push:
    branches:
      - develop
      - eyupsosa34-patch-1

  workflow_run:
    workflows: ["Vue CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            set -e

            echo "Deploy başlıyor..."

            if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.head_branch }}" != "develop" ]; then
              echo "Not develop branch → exit"
              exit 0
            fi

            IMAGE="ghcr.io/${{ github.repository_owner }}/devboard-webui:develop"
            CONTAINER="devboard"
            OLD="devboard_old"

            docker pull $IMAGE

            if [ "$(docker ps -aq -f name=^/${CONTAINER}$)" ]; then
              docker stop $CONTAINER || true
              docker rename $CONTAINER $OLD || true
            fi

            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              -p 80:80 \
              $IMAGE

            echo "Health check..."
            SUCCESS=false

            for i in {1..10}; do
              if curl -fs http://localhost > /dev/null; then
                SUCCESS=true
                break
              fi
              echo "Bekleniyor... ($i/10)"
              sleep 3
            done

            if [ "$SUCCESS" = true ]; then
              echo "Deploy başarılı"
              docker rm $OLD || true
              docker image prune -f
            else
              echo "Deploy başarısız → rollback"
              docker stop $CONTAINER || true
              docker rm $CONTAINER || true

              if [ "$(docker ps -aq -f name=^/${OLD}$)" ]; then
                docker start $OLD
                docker rename $OLD $CONTAINER
                echo "Rollback başarılı"
              else
                echo "Eski container bulunamadı"
              fi

              exit 1
            fi

name: Vue CD Pipeline

on:
  workflow_run:
    workflows: ["Vue CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Sunucuya Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.USERNAME }}/devboard || mkdir -p /home/${{ secrets.USERNAME }}/devboard && cd /home/${{ secrets.USERNAME }}/devboard

            # eski container temizle
            docker stop devboard || true
            docker rm devboard || true

             # image build (VM üzerinde)
            docker build -t devboard:${{ github.sha }} .

            # yeni container başlat
            docker run -d \
              --name devboard \
              -p 80:80 \
              devboard:${{ github.sha }}

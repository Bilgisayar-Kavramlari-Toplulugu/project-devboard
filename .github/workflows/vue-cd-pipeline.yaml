name: Vue CD Pipeline

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/${{ secrets.USERNAME }}/devboard || mkdir -p /home/${{ secrets.USERNAME }}/devboard && cd /home/${{ secrets.USERNAME }}/devboard

            # repo güncelle
            if [ ! -d ".git" ]; then
              git clone https://github.com/Bilgisayar-Kavramlari-Toplulugu/project-devboard.git .
            else
              git pull
            fi

            # eski container temizle
            docker stop devboard || true
            docker rm devboard || true

            # yeni container başlat
              --name devboard \
              -p 80:5173 \
              devboard:${{ github.sha }}

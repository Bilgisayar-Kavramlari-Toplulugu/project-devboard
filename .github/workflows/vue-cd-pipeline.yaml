name: Vue CI Pipeline

on:
  pull_request:
    branches: ["develop"]

jobs:
  test-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test:unit

      - name: Build Project
        run: npm run build

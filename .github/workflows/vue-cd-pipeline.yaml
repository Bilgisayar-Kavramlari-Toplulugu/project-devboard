name: Vue CD Pipeline

on:
  workflow_run:
    workflows: ["Vue CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Stop and Delete Existing Container
        run: |
          docker stop devboard || true
          docker rm devboard || true

      - name: Remove Old Image
        run: |
          docker rmi devboard:latest || true
          docker rmi devboard:${GITHUB_SHA} || true

      - name: Run New Container
        run: |
          docker run -d \
            --name devboard \
            -p 80:80 \
            devboard:${GITHUB_SHA}

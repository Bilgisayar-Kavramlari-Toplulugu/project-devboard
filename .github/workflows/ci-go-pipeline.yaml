name: Go CI Pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install lint tool
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest

      - name: Run lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download deps
        run: go mod download

      - name: Run tests
        run: go test ./... -v -cover

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download deps
        run: go mod download

      - name: Build binary
        run: go build -o app .

name: Go CI Pipeline

on:
  pull_request:
    branches: ["develop"]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Run lint
        run: golangci-lint run ./...

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -cover

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: DevBoard.API

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: go build -o app .

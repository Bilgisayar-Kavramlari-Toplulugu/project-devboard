name: Vue CI Pipeline

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci --prefer-offline --no-audit

      - name: Build
        run: npm run build

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/devboard-webui:latest \
            -t ghcr.io/${{ github.repository_owner }}/devboard-webui:${{ github.sha }} \
            DevBoard.WebUI

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/devboard-webui:latest
          docker push ghcr.io/${{ github.repository_owner }}/devboard-webui:${{ github.sha }}

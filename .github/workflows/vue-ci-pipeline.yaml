name: Vue CI Pipeline

on:
  pull_request:
    branches: ["develop"]
    paths:
      - "DevBoard.WebUI/**"


jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Lint
        run: npm run lint


  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Tests
        run: npm run test:unit


  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: DevBoard.WebUI/dist

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build -t ghcr.io/${OWNER_LC}/devboard-webui:${SHORT_SHA} ./DevBoard.WebUI

      - name: Push Docker Image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push ghcr.io/${OWNER_LC}/devboard-webui:${SHORT_SHA}

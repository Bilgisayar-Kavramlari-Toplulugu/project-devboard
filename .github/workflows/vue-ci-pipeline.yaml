name: Vue CI Pipeline

on:
  push:
    branches: ["develop"]

jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run lint


  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run test:unit


  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build


  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/devboard-webui:sha-${{ github.sha }} ./DevBoard.WebUI

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/devboard-webui:sha-${{ github.sha }}

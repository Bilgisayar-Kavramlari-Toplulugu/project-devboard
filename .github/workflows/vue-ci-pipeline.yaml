name: Vue CI Pipeline

on:
  push:
    branches: 
      - develop
      - eyupsosa34-patch-1  # for testing only
    paths:
      - "DevBoard.WebUI/**"
      
concurrency:
  group: vue-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DevBoard.WebUI/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DevBoard.WebUI/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run Tests
        run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DevBoard.WebUI/package-lock.json

      - name: Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Vue Project
        run: npm run build

      - name: Validate Docker Build
        run: |
          docker build \
            -t devboard-ci:${{ github.sha }} \
            .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: DevBoard.WebUI/dist
          retention-days: 1

      - name: Build Docker Image (using WebUI Dockerfile)
        run: |
          docker build \
            -t devboard-ci:${{ github.sha }} \
            -f DevBoard.WebUI/Dockerfile \
            DevBoard.WebUI

name: Vue CI Pipeline

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --prefer-offline --no-audit
      - run: npm run lint


  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --prefer-offline --no-audit
      - run: npm run test:unit


  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci --prefer-offline --no-audit
      - run: npm run build

      # Docker login
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Build image (BOTH tags: latest + sha)
      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/devboard-webui:latest \
            -t ghcr.io/${{ github.repository_owner }}/devboard-webui:${{ github.sha }} \
            DevBoard.WebUI

      # Push images
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/devboard-webui:latest
          docker push ghcr.io/${{ github.repository_owner }}/devboard-webui:${{ github.sha }}

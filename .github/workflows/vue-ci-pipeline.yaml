name: Vue CI Pipeline

on:
  push:
    branches: ["develop"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Project
        run: npm run build

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image (SHORT SHA)
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t ghcr.io/${{ github.repository_owner }}/devboard-webui:sha-$SHORT_SHA DevBoard.WebUI

      - name: Push Docker Image
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          docker push ghcr.io/${{ github.repository_owner }}/devboard-webui:sha-$SHORT_SHA

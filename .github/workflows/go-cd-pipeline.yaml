name: Backend CD Pipeline

on:
  push:
    branches:
      - eyupsosa34-patch-1
      
  pull_request:
    branches:
      - eyupsosa34-patch-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            APP_DIR=/home/${{ secrets.USERNAME }}/devboard

            mkdir -p $APP_DIR
            cd $APP_DIR

            git pull origin develop

            docker stop devboard-api || true
            docker rm devboard-api || true

            docker build \
              -t devboard-api:${{ github.sha }} \
              -f DevBoard.API/Dockerfile \
              DevBoard.API

            docker run -d \
              --name devboard-api \
              -p 8080:8080 \
              devboard-api:${{ github.sha }}

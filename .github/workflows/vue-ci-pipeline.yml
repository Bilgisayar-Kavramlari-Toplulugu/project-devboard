name: Vue CI Pipeline

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]


jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ci-test/project-devboard/DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint


  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ci-test/project-devboard/DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test --if-present


  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ci-test/project-devboard/DevBoard.WebUI

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vue-dist
          path: dist

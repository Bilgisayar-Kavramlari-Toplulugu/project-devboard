name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./DevBoard.WebUI

      - name: Build
        run: npm run build
        working-directory: ./DevBoard.WebUI

      - name: Test
        run: npm run test:unit
        working-directory: ./DevBoard.WebUI

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: ./DevBoard.WebUI/dist

version: "3.9"

services:
  db:
    image: postgres:17-alpine
    container_name: devboard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: project-devboard-backend
    container_name: devboard_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/devboard?sslmode=disable
      GIN_MODE: release
    ports:
      - "8080:8080"

  frontend:
    image: project-devboard-frontend
    container_name: devboard_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:5173"

volumes:
  postgres_data:
